<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>For You — Always</title>

    <!-- Font preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="celebration.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <!-- Ambient depth layers -->
    <div id="stars"></div>
    <div id="flowers-container"></div>
    <div id="emojis-container"></div>
    <div id="hearts-container"></div>
    <div id="confetti-container"></div>

    <!-- Main slideshow -->
    <div id="presentationView" class="presentation-view"></div>

    <!-- Progress bar -->
    <div class="progress-container">
        <div id="progressFill" class="progress-fill"></div>
    </div>

    <!-- Slide counter -->
    <div class="slide-counter" id="slideCounter">1/11</div>

    <!-- Music -->
    <audio id="backgroundMusic" loop autoplay preload="auto">
        <source src="O.mp3" type="audio/mp3">
        <source src="O.ogg" type="audio/ogg">
    </audio>

    <!-- Back button -->
    <div class="back-button">
        <a href="index.html" class="btn-back">← Go Back</a>
    </div>

    <script src="celebration.js"></script>
</body>

</html>
