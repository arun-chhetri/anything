<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#feecea">
    <title>Happy Birthday!</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div id="wrapper">
        <div class="flag__birthday">
            <img src="1.png?height=350&width=350" alt="" width="350" class="flag__left">
            <img src="1.png" alt="" width="350" class="flag__right">
        </div>
        <div class="content">
            <div class="left">
                <div class="title">
                    <h1 class="happy">
                        <span style="--t: 2s;">H</span>
                        <span style="--t: 2.2s;">a</span>
                        <span style="--t: 2.4s;">p</span>
                        <span style="--t: 2.6s;">p</span>
                        <span style="--t: 2.8s;">y</span>
                    </h1>
                    <h1 class="birthday">
                        <span style="--t: 4s;">B</span>
                        <span style="--t: 4.2s;">i</span>
                        <span style="--t: 4.4s;">r</span>
                        <span style="--t: 4.6s;">t</span>
                        <span style="--t: 4.8s;">h</span>
                        <span style="--t: 5s;">d</span>
                        <span style="--t: 5.2s;">a</span>
                        <span style="--t: 5.4s;">y</span>
                    </h1>
                    <div class="hat">
                        <img src="4.png" alt="" width="130">
                    </div>

                </div>
                <div class="date__of__birth">
                    <span></span>
                </div>
                <div class="btn">
                    <button id="btn__letter">
                        Click here
                        <i class="fa-regular fa-envelope"></i>
                    </button>
                </div>
            </div>
            <div class="right">
                <div class="box__account">
                    <div class="image">
                        <img src="profile.jpg" alt="">
                    </div>
                    <div class="name">
                        <i class="fa-solid fa-heart"></i>
                        <span>Birthday Person</span>
                        <i class="fa-solid fa-heart"></i>
                    </div>              
                </div>
                <div class="cricle">
                    <div class="text__cricle">
                        <span style="--i: 1;">h</span>
                        <span style="--i: 2;">a</span>
                        <span style="--i: 3;">p</span>
                        <span style="--i: 4;">p</span>
                        <span style="--i: 5;">y</span>
                        <span style="--i: 6;">-</span>
                        <span style="--i: 7;">b</span>
                        <span style="--i: 8;">i</span>
                        <span style="--i: 9;">r</span>
                        <span style="--i: 10;">t</span>
                        <span style="--i: 11;">h</span>
                        <span style="--i: 12;">d</span>
                        <span style="--i: 13;">a</span>
                        <span style="--i: 14;">y</span>
                        <span style="--i: 15;">-</span>
                    </div>
                    <i class="fa-solid fa-heart"></i>
                </div>
            </div>
        </div>
        <div class="decorate_star star1" style="--t: 15s;"></div>
        <div class="decorate_star star2" style="--t: 15.2s;"></div>
        <div class="decorate_star star3" style="--t: 15.4s;"></div>
        <div class="decorate_star star4" style="--t: 15.6s;"></div>
        <div class="decorate_star star5" style="--t: 15.8s;"></div>
        <div class="decorate_flower--one" style="--t: 15s;">
            <img width="20" src="3.png" alt="">
        </div>
        <div class="decorate_flower--two" style="--t: 15.3s;">
            <img width="20" src="3.png" alt="">
        </div>
        <div class="decorate_flower--three" style="--t: 15.6s;">
            <img width="20" src="3.png" alt="">
        </div>
        <div class="smiley__icon">
            <img src="" alt="" width="100">
        </div>
    </div>
     <audio id="backgroundMusic" loop autoplay preload="auto">
        <source src="h.mp3" type="audio/mp3">
        <source src="happy-birthday-song.ogg" type="audio/ogg">
        Your browser does not support the audio element.
    </audio>

    <script src="script.js"></script>
</body>
</html>
